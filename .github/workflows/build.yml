name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller oci paramiko requests cryptography pypinyin

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --name "OCI本地化管理工具" --onefile --windowed --noconfirm oci-instance-manager-gui.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: OCI本地化管理工具-Windows
        path: dist/OCI本地化管理工具.exe
